name: FP-ZERO Regression Tests

on:
  push:
    branches: ["main", "master"]
    paths:
      - "bingo/ui/terminal.py"        # MVVS 패턴 변경 시 자동 실행
      - "bingo/models/system_prompt.py"
      - "tests/test_mvvs_false_positive.py"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "bingo/ui/terminal.py"
      - "bingo/models/system_prompt.py"
      - "tests/test_mvvs_false_positive.py"
  workflow_dispatch:                  # 수동 실행 가능

jobs:
  fp-regression:
    name: "FP-ZERO Regression (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ".[dev]" --no-deps 2>/dev/null || pip install pytest

      - name: Run FP-ZERO Regression Suite
        run: |
          python -m pytest tests/test_mvvs_false_positive.py -v \
            --tb=short \
            --no-header \
            -q

      - name: Summary
        if: always()
        run: |
          echo "## FP-ZERO Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Tests |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| False Positive Prevention | 25 cases |" >> $GITHUB_STEP_SUMMARY
              echo "| True Positive Detection   | 17 cases |" >> $GITHUB_STEP_SUMMARY
              echo "| BINGO_SIGNAL Valid        | 10 cases |" >> $GITHUB_STEP_SUMMARY
              echo "| BINGO_SIGNAL Invalid      | 12 cases |" >> $GITHUB_STEP_SUMMARY
              echo "| **Total** | **64 cases** |" >> $GITHUB_STEP_SUMMARY
